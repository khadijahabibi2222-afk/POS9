<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SwiftPOS</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#2563eb;--acl:#eff6ff;--acm:#3b82f6;--acd:#1d4ed8;
  --green:#16a34a;--greenl:#f0fdf4;--greenm:#22c55e;
  --amber:#d97706;--amberl:#fffbeb;
  --red:#dc2626;--redl:#fef2f2;
  --purple:#7c3aed;--purplel:#f5f3ff;
  --orange:#ea580c;--orangel:#fff7ed;
  --t1:#111827;--t2:#6b7280;--t3:#9ca3af;
  --bg1:#ffffff;--bg2:#f9fafb;--bg3:#f3f4f6;
  --bd:#e5e7eb;--bd2:#d1d5db;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg2);color:var(--t1);font-size:13px;line-height:1.5;overflow:hidden}
#wrap{display:flex;flex-direction:column;height:100vh;min-height:560px}
/* ── TOPBAR */
.topbar{height:50px;background:var(--ac);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.tb-brand{display:flex;align-items:center;gap:8px}
.tb-logo{width:28px;height:28px;background:rgba(255,255,255,.2);border-radius:7px;display:flex;align-items:center;justify-content:center}
.tb-name{font-size:15px;font-weight:600;color:#fff;letter-spacing:-.01em}
.tb-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.25)}
#tx-pill{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.2)}
/* ── BODY */
.body{display:flex;flex:1;overflow:hidden}
/* ── SIDEBAR */
.sidebar{width:188px;background:var(--bg1);border-right:1px solid var(--bd);padding:10px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.sn{display:flex;align-items:center;gap:9px;padding:8px 12px;font-size:12.5px;color:var(--t2);cursor:pointer;border:none;background:none;width:100%;border-radius:var(--radius);transition:all .12s;font-weight:400;white-space:nowrap}
.sn i{font-size:16px;flex-shrink:0;width:18px;text-align:center}
.sn:hover{background:var(--bg3);color:var(--t1)}
.sn.on{background:var(--acl);color:var(--ac);font-weight:500}
.sn.on i{color:var(--ac)}
.sn-sep{height:1px;background:var(--bd);margin:6px 4px}
.sn-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:8px 12px 2px}
/* ── MAIN */
.main{flex:1;overflow-y:auto;padding:16px;background:var(--bg2);min-width:0}
/* ── STAT CARDS */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:12px 14px}
.sc-accent{border-left:3px solid var(--ac)}
.sc-green{border-left:3px solid var(--greenm)}
.sc-amber{border-left:3px solid #f59e0b}
.sc-red{border-left:3px solid #f87171}
.sc-purple{border-left:3px solid #a78bfa}
.sc-orange{border-left:3px solid #fb923c}
.sl{font-size:10.5px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-weight:500}
.sv{font-size:20px;font-weight:600;color:var(--t1);line-height:1}
/* ── CARD */
.card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.ch{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:12.5px;font-weight:600;color:var(--t1);display:flex;align-items:center;justify-content:space-between}
.ch i{color:var(--t2);font-size:15px;margin-right:6px}
.cb{padding:12px 14px}
/* ── TABLE */
table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:12px}
th{color:var(--t2);font-weight:600;padding:7px 10px;border-bottom:1px solid var(--bd);text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;background:var(--bg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
td{padding:8px 10px;border-bottom:1px solid var(--bd);color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
/* ── BADGES */
.badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600;display:inline-block;white-space:nowrap}
.b-g{background:#dcfce7;color:#15803d}
.b-r{background:#fee2e2;color:#b91c1c}
.b-a{background:#fef3c7;color:#b45309}
.b-b{background:#dbeafe;color:#1d4ed8}
.b-p{background:#ede9fe;color:#6d28d9}
.b-o{background:#ffedd5;color:#c2410c}
.b-gray{background:var(--bg3);color:var(--t2)}
.b-owner{background:#ede9fe;color:#5b21b6}
.b-admin{background:#dbeafe;color:#1d4ed8}
.b-cashier{background:#dcfce7;color:#15803d}
.b-viewer{background:var(--bg3);color:var(--t2)}
.b-active{background:#dcfce7;color:#15803d}
.b-inactive{background:#fee2e2;color:#b91c1c}
/* ── BUTTONS */
.btn{background:var(--ac);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;padding:6px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:background .15s;white-space:nowrap}
.btn:hover{background:var(--acd)}
.btn-green{background:var(--green)}.btn-green:hover{background:#15803d}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#b91c1c}
.btn-sm{background:var(--bg1);border:1px solid var(--bd2);border-radius:6px;font-size:11px;padding:3px 9px;cursor:pointer;color:var(--t2);display:inline-flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.btn-sm:hover{background:var(--bg3);color:var(--t1)}
.btn-sm.grn:hover{background:var(--greenl);color:var(--green);border-color:var(--greenm)}
.btn-sm.red:hover{background:var(--redl);color:var(--red);border-color:#fca5a5}
.btn-danger{background:var(--redl);color:var(--red);border:1px solid #fca5a5}.btn-danger:hover{background:#fee2e2}
.icon-btn{background:none;border:1px solid var(--bd2);color:var(--t2);font-size:14px;padding:4px 7px;border-radius:var(--radius);cursor:pointer;display:inline-flex;align-items:center;transition:all .12s}
.icon-btn:hover{background:var(--bg3);color:var(--t1)}
.icon-btn.del:hover{background:var(--redl);color:var(--red);border-color:#fca5a5}
/* ── FORMS */
.form-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px;padding:12px 14px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--bd)}
.fi{height:32px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg1);color:var(--t1);font-size:12px;padding:0 9px;transition:border .15s;font-family:inherit}
.fi:focus{outline:none;border-color:var(--acm);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.fl{font-size:10.5px;color:var(--t2);margin-bottom:3px;display:block;font-weight:500}
.col{display:flex;flex-direction:column}
.fr{display:flex;flex-direction:column;gap:4px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
/* ── BANNERS */
.info-banner{background:var(--acl);border:1px solid #bfdbfe;border-radius:var(--radius);padding:8px 12px;font-size:11.5px;color:var(--ac);display:flex;align-items:center;gap:8px;margin-bottom:12px;font-weight:500}
.success-banner{background:var(--greenl);border:1px solid #bbf7d0;color:var(--green)}
/* ── FLOW */
.flow-arrow{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--t2);margin-bottom:10px;flex-wrap:wrap}
.flow-step{background:var(--bg1);border:1px solid var(--bd2);border-radius:var(--radius);padding:4px 10px;font-size:11.5px;white-space:nowrap}
.flow-step.lit{background:var(--acl);border-color:var(--acm);color:var(--ac);font-weight:600}
/* ── POS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:8px;overflow-y:auto;max-height:none}
.pcard{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:10px 9px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.pcard:hover,.pcard:active{border-color:var(--acm);background:var(--acl);box-shadow:0 2px 8px rgba(37,99,235,.12)}
.pcard-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:2px;line-height:1.3}
.pcard-price{font-size:13px;color:var(--ac);font-weight:700}
.pcard-unit{font-size:10px;color:var(--t3);margin-top:2px}
/* POS layout */
.pos-layout{display:grid;grid-template-columns:1fr 240px;gap:12px;height:calc(100vh - 118px)}
.pos-products{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-width:0}
.pos-cart-col{display:flex;flex-direction:column;gap:8px;overflow-y:auto}
/* Mobile hamburger */
.mob-menu-btn{display:none;background:none;border:none;cursor:pointer;color:#fff;font-size:20px;padding:4px;flex-shrink:0}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
.mob-overlay.show{display:block}
/* Mobile cart FAB */
.mob-cart-fab{display:none}
@media(max-width:700px){
  body{overflow:auto}
  .sidebar{position:fixed;top:50px;left:-210px;bottom:0;width:200px;z-index:50;transition:left .22s;box-shadow:none}
  .sidebar.mob-open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.18)}
  .mob-menu-btn{display:flex;align-items:center;justify-content:center}
  .pos-layout{grid-template-columns:1fr;height:auto}
  .pos-cart-col{display:none;position:fixed;top:50px;left:0;right:0;bottom:0;z-index:40;background:var(--bg2);overflow-y:auto;padding:12px;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
  .pos-cart-col.mob-open{display:flex}
  .mob-cart-close{display:flex !important}
  .mob-cart-fab{display:flex;position:fixed;bottom:20px;right:18px;z-index:39;width:58px;height:58px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.45);color:#fff;font-size:24px;-webkit-tap-highlight-color:transparent}
  .mob-cart-badge{position:absolute;top:0;right:0;background:#ef4444;color:#fff;border-radius:50%;width:20px;height:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;pointer-events:none}
  table{font-size:11px}
  th,td{padding:6px 7px}
  .stat-row{grid-template-columns:repeat(2,1fr)}
}
.cart-box{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:8px;min-height:60px;flex:1;overflow-y:auto}
.ci{display:flex;justify-content:space-between;align-items:center;padding:5px 3px;border-bottom:1px solid var(--bd);font-size:11.5px}
.ci:last-child{border-bottom:none}
/* ── PURCHASE SUB-TABS */
.subtab-row{display:flex;gap:2px;margin-bottom:14px;background:var(--bg3);border-radius:var(--radius);padding:3px;flex-wrap:wrap}
.subtab{background:none;border:none;border-radius:6px;font-size:12px;padding:6px 13px;cursor:pointer;color:var(--t2);display:flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap}
.subtab i{font-size:14px}
.subtab:hover{color:var(--t1);background:rgba(255,255,255,.6)}
.subtab.on{background:var(--bg1);color:var(--ac);font-weight:600;box-shadow:var(--shadow)}
.tbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.srch-w{position:relative;flex:1;min-width:140px}
.srch-w i{position:absolute;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t2);left:8px;pointer-events:none}
.srch-w input{width:100%;height:32px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg1);color:var(--t1);font-size:12px;padding:0 8px 0 28px;font-family:inherit}
.srch-w input:focus{outline:none;border-color:var(--acm);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.filt-btn{background:none;border:1px solid var(--bd2);border-radius:20px;font-size:11px;padding:4px 11px;cursor:pointer;color:var(--t2);transition:all .12s;white-space:nowrap}
.filt-btn.on{background:var(--acl);border-color:var(--acm);color:var(--ac);font-weight:600}
/* ── SUPPLIER CARDS */
.sup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px}
.sup-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:14px;transition:border-color .15s}
.sup-card:hover{border-color:var(--acm)}
.sup-avatar{width:38px;height:38px;border-radius:50%;background:var(--acl);color:var(--ac);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.sup-name{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:2px}
.sup-cat{font-size:11px;color:var(--t2);margin-bottom:7px}
.sup-meta{font-size:11px;color:var(--t2);display:flex;flex-direction:column;gap:3px}
.sup-meta i{font-size:12px;margin-right:4px;color:var(--t3)}
.sup-actions{display:flex;gap:6px;margin-top:10px;border-top:1px solid var(--bd);padding-top:9px}
.sup-btn{flex:1;background:none;border:1px solid var(--bd2);border-radius:var(--radius);font-size:11px;padding:5px;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;gap:4px;transition:all .12s}
.sup-btn:hover{background:var(--acl);color:var(--ac);border-color:var(--acm)}
/* ── SETTINGS */
.set-sidebar{width:176px;background:var(--bg1);border-right:1px solid var(--bd);flex-shrink:0;padding:8px 0;overflow-y:auto}
.ssn-section{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px 3px}
.ssn{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;color:var(--t2);font-size:12.5px;border:none;background:none;width:100%;transition:all .12s;font-weight:400;white-space:nowrap}
.ssn i{font-size:16px;flex-shrink:0;width:18px}
.ssn:hover{background:var(--bg2);color:var(--t1)}
.ssn.on{background:var(--acl);color:var(--ac);font-weight:500}
.set-main{flex:1;overflow-y:auto;padding:16px}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.page-title{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:7px}
.page-title i{font-size:18px;color:var(--ac)}
.store-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.store-lbl{font-size:11px;font-weight:500;color:var(--t2)}
.store-val{height:32px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg2);color:var(--t1);font-size:12px;padding:0 9px;width:100%;font-family:inherit}
.store-val:focus{outline:none;border-color:var(--acm);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.save-btn{background:var(--ac);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:500;padding:7px 18px;cursor:pointer;margin-top:4px}
.save-btn:hover{background:var(--acd)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.toggle-row:last-child{border-bottom:none}
.toggle-info{display:flex;flex-direction:column;gap:2px}
.toggle-lbl{font-size:12.5px;font-weight:500;color:var(--t1)}
.toggle-sub{font-size:11px;color:var(--t2)}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:#d1d5db;border-radius:20px;cursor:pointer;transition:background .2s}
.toggle input:checked+.slider{background:var(--ac)}
.slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.slider:before{transform:translateX(16px)}
.perm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px}
.perm-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:9px 11px;display:flex;align-items:center;justify-content:space-between}
.perm-lbl{font-size:12px;color:var(--t1)}
.partner-card{background:var(--bg1);border:1px solid var(--bd);border-radius:var(--radius-lg);padding:14px;margin-bottom:12px}
.partner-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.partner-avatar{width:38px;height:38px;border-radius:50%;background:var(--purplel);color:var(--purple);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.partner-name{font-size:13px;font-weight:600;color:var(--t1)}
.partner-role{font-size:11px;color:var(--t2)}
.partner-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ps{background:var(--bg2);border-radius:var(--radius);padding:8px 10px;text-align:center}
.ps-lbl{font-size:10px;color:var(--t2);margin-bottom:3px}
.ps-val{font-size:14px;font-weight:600;color:var(--t1)}
.prog-bg{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:4px}
.prog-fill{height:100%;background:var(--ac);border-radius:4px}
.danger-zone{background:var(--redl);border:1px solid #fca5a5;border-radius:var(--radius-lg);padding:14px;margin-bottom:14px}
.dz-title{font-size:13px;font-weight:600;color:var(--red);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dz-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #fca5a5}
.dz-row:last-child{border-bottom:none}
.dz-info{display:flex;flex-direction:column;gap:2px}
.dz-lbl{font-size:12.5px;font-weight:600;color:var(--red)}
.dz-sub{font-size:11px;color:var(--red);opacity:.75}
.dz-btn{background:none;border:1px solid var(--red);border-radius:var(--radius);font-size:11.5px;padding:5px 12px;cursor:pointer;color:var(--red);white-space:nowrap;transition:all .15s}
.dz-btn:hover{background:var(--red);color:#fff}
.backup-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd)}
.backup-row:last-child{border-bottom:none}
.backup-info{display:flex;flex-direction:column;gap:2px}
.backup-lbl{font-size:12.5px;font-weight:500;color:var(--t1)}
.backup-sub{font-size:11px;color:var(--t2)}
.backup-btn{background:none;border:1px solid var(--bd2);border-radius:var(--radius);font-size:11.5px;padding:5px 11px;cursor:pointer;color:var(--t2);display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
.backup-btn:hover{background:var(--acl);color:var(--ac);border-color:var(--acm)}
/* ── MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg1);border-radius:var(--radius-lg);border:1px solid var(--bd);width:400px;max-width:96%;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.mh{padding:13px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:13px;font-weight:600;color:var(--t1)}
.xbtn{background:none;border:none;font-size:18px;color:var(--t2);cursor:pointer;line-height:1;padding:2px}
.xbtn:hover{color:var(--t1)}
.mb{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.mf{padding:11px 16px;border-top:1px solid var(--bd);display:flex;gap:7px;justify-content:flex-end}
.oi-row{display:flex;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)}
.oi-row:last-child{border-bottom:none}
.oi-qty,.oi-price{width:64px;height:28px;border:1px solid var(--bd2);border-radius:6px;background:var(--bg2);color:var(--t1);font-size:12px;padding:0 6px;text-align:center;font-family:inherit}
.oi-qty:focus,.oi-price:focus{outline:none;border-color:var(--acm)}

<script>
/* ════════════════════════════════════════════
   DATA STORE — Cloud API (no localStorage)
   Backend: Express + SQLite on Render/Railway
   API base: /api  (same origin, no CORS needed)
════════════════════════════════════════════ */
const UNITS=['pcs','kg','g','ltr','ml','box','carton','dozen','pair','set','m','cm'];

// In-memory db object — loaded from server on boot, saved back on every change
let db = {};
let _saveTimer = null;

/* ── API helpers ── */
async function apiGet(){
  const r = await fetch('/api/db');
  if(!r.ok) throw new Error('Failed to load data from server');
  return r.json();
}
async function apiPut(data){
  return fetch('/api/db',{
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  });
}
async function apiDelete(){
  return fetch('/api/db',{method:'DELETE'});
}

/* ── saveDB — debounced 400ms so rapid changes batch into one PUT ── */
function saveDB(){
  updatePills();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async ()=>{
    try{
      await apiPut(db);
    }catch(e){
      showToast('⚠ Save failed — check connection');
    }
  }, 400);
}

/* ── clearAll — calls DELETE /api/db then reloads ── */
async function clearAll(){
  if(!confirm('Reset all data to defaults?'))return;
  showLoader('Resetting…');
  try{
    await apiDelete();
    db = await apiGet();
    hideLoader();
    nav('pos',document.querySelector('.sn'));
    showToast('✓ Data reset to defaults');
  }catch(e){
    hideLoader();
    showToast('⚠ Reset failed');
  }
}

/* ── Loading overlay helpers ── */
function showLoader(msg='Loading…'){
  let el=document.getElementById('_loader');
  if(!el){
    el=document.createElement('div');
    el.id='_loader';
    el.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.72);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#fff;font-family:inherit';
    el.innerHTML=`<div style="width:36px;height:36px;border:3px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:_spin .7s linear infinite"></div><div id="_loader_msg" style="font-size:14px;font-weight:500;color:rgba(255,255,255,.9)"></div>`;
    if(!document.getElementById('_spin_style')){const s=document.createElement('style');s.id='_spin_style';s.textContent='@keyframes _spin{to{transform:rotate(360deg)}}';document.head.appendChild(s);}
    document.body.appendChild(el);
  }
  document.getElementById('_loader_msg').textContent=msg;
  el.style.display='flex';
}
function hideLoader(){
  const el=document.getElementById('_loader');
  if(el)el.style.display='none';
}

function updatePills(){
  const today=new Date().toISOString().slice(0,10);
  const n=db.sales.filter(s=>s.date===today).length;
  const el=document.getElementById('tx-pill');
  if(el)el.innerHTML=`<i class="ti ti-receipt" style="font-size:11px;margin-right:3px"></i>${n} sale${n!==1?'s':''} today`;
}

let _curPage='pos';
function nav(page,btn){
  _curPage=page;
  document.querySelectorAll('.sn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  render(page);
}
function render(page){
  const m=document.getElementById('main');
  if(page==='pos'){m.style.padding='16px';renderPOS();}
  else if(page==='items'){m.style.padding='16px';renderItems();}
  else if(page==='purchase'){m.style.padding='16px';renderPurchase();}
  else if(page==='finance'){m.style.padding='16px';renderFinance();}
  else if(page==='expenses'){m.style.padding='16px';renderExpenses();}
  else if(page==='cash'){m.style.padding='16px';renderCash();}
  else if(page==='customers'){m.style.padding='16px';renderCustomers();}
  else if(page==='settings'){m.style.padding='0';renderSettings();}
  else{m.style.padding='16px';renderDashboard();}
}

/* ════════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════════ */
function renderDashboard(){
  const today=new Date().toISOString().slice(0,10);
  const ts=db.sales.filter(s=>s.date===today);
  const rev=ts.reduce((s,x)=>s+x.total,0);
  const low=db.items.filter(i=>i.stock>0&&i.stock<=i.min).length;
  const out=db.items.filter(i=>i.stock===0).length;
  const pendPO=db.orders.filter(o=>o.status==='pending'||o.status==='partial').length;
  const debtors=db.customers.filter(c=>c.balance>0).length;
  document.getElementById('main').innerHTML=`
    <div class="info-banner success-banner"><i class="ti ti-cloud" style="font-size:15px"></i>All data persists on the server (SQLite) — sales, purchases, items, customers and settings are saved automatically via API</div>
    <div class="stat-row">
      <div class="sc sc-green"><div class="sl">Today revenue</div><div class="sv" style="color:var(--green)">${db.settings.currency}${rev.toFixed(2)}</div></div>
      <div class="sc sc-accent"><div class="sl">Today sales</div><div class="sv" style="color:var(--ac)">${ts.length}</div></div>
      <div class="sc sc-amber"><div class="sl">Low stock</div><div class="sv" style="color:var(--amber)">${low}</div></div>
      <div class="sc sc-red"><div class="sl">Out of stock</div><div class="sv" style="color:var(--red)">${out}</div></div>
      <div class="sc sc-orange"><div class="sl">Pending POs</div><div class="sv" style="color:var(--orange)">${pendPO}</div></div>
      <div class="sc sc-purple"><div class="sl">Credit customers</div><div class="sv" style="color:var(--purple)">${debtors}</div></div>
    </div>
    <div class="card">
      <div class="ch"><span><i class="ti ti-route"></i>Full data flow</span></div>
      <div class="cb">
        <div class="flow-arrow">
          <span class="flow-step lit"><i class="ti ti-truck" style="font-size:12px"></i> PO received</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step">stock + units</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step">finance − expense</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step lit"><i class="ti ti-cash-register" style="font-size:12px"></i> POS sale</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step">stock − units</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step">finance + income</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step">customer + points</span>
          <i class="ti ti-arrow-right"></i><span class="flow-step lit"><i class="ti ti-database" style="font-size:12px"></i> saved</span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ch"><span><i class="ti ti-receipt"></i>Recent sales</span></div>
      <table><thead><tr>
        <th style="width:90px">Ref</th><th style="width:88px">Date</th><th style="width:120px">Customer</th>
        <th style="width:55px">Mode</th><th style="width:75px">Total</th><th style="width:70px">Method</th>
      </tr></thead>
      <tbody>${db.sales.slice(-6).reverse().map(s=>`<tr>

function renderPOSCards(items){
  const mode=window._posMode||'retail';
  if(!items.length)return'<p style="font-size:12px;color:var(--t2);padding:12px;grid-column:1/-1">No items in stock</p>';
  return items.map(it=>`<div class="pcard" id="pc-${it.id}" onclick="addToCart(${it.id})">
    <div class="pcard-name">${it.name}</div>
    <div class="pcard-price" id="pp-${it.id}">${db.settings.currency}${(mode==='wholesale'?it.wsPrice:it.price).toFixed(2)}</div>
    <div class="pcard-unit" id="pu-${it.id}">Stock: ${it.stock} ${it.unit}</div>
  </div>`).join('');
}
function filterPOSGrid(q){
  const avail=db.items.filter(i=>i.stock>0&&(!q||i.name.toLowerCase().includes(q.toLowerCase())));
  const pgrid=document.getElementById('pgrid');
  if(pgrid)pgrid.innerHTML=renderPOSCards(avail);
}
function openMobileCart(){document.getElementById('pos-cart-col')?.classList.add('mob-open');}
function closeMobileCart(){document.getElementById('pos-cart-col')?.classList.remove('mob-open');}
function toggleSidebar(){
  document.querySelector('.sidebar')?.classList.toggle('mob-open');
  document.getElementById('mob-overlay')?.classList.toggle('show');
}

function setPOSMode(mode){
  window._posMode=mode;
  document.getElementById('mode-retail')?.classList.toggle('on',mode==='retail');
  document.getElementById('mode-wholesale')?.classList.toggle('on',mode==='wholesale');
  const q=document.getElementById('pos-srch')?.value||'';
  const avail=db.items.filter(i=>i.stock>0&&(!q||i.name.toLowerCase().includes(q.toLowerCase())));
  const pgrid=document.getElementById('pgrid');
  if(pgrid)pgrid.innerHTML=renderPOSCards(avail);
  window._cart=[];updateCartUI();
}

function addToCart(itemId){
  const item=db.items.find(i=>i.id===itemId);
  if(!item||item.stock<=0)return;
  const mode=window._posMode||'retail';
  const price=mode==='wholesale'?item.wsPrice:item.price;
  const unitLabel=mode==='wholesale'?item.wsUnit:item.unit;
  const stockUnits=mode==='wholesale'?Math.floor(item.stock/item.wsQty):item.stock;
  const ex=(window._cart||[]).find(c=>c.id===itemId);
  if(ex){if(ex.qty<stockUnits)ex.qty++;else{showToast('Max stock reached');return;}}
  else window._cart.push({id:itemId,name:item.name,price,cost:item.cost,qty:1,unit:unitLabel,wsQty:item.wsQty,mode});
  updateCartUI();
}

function updateCartUI(){
  const cart=window._cart||[];
  const cartEl=document.getElementById('cart');
  const emptyEl=document.getElementById('cart-empty');
  if(!cartEl)return;
  cartEl.querySelectorAll('.ci').forEach(e=>e.remove());
  if(emptyEl)emptyEl.style.display=cart.length?'none':'block';
  let sub=0;
  cart.forEach(ci=>{
    sub+=ci.price*ci.qty;
    const d=document.createElement('div');d.className='ci';
    d.innerHTML=`<span style="flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ci.name}</span>
      <span style="color:var(--t3);font-size:10px;margin:0 3px;flex-shrink:0">${ci.unit}</span>
      <span style="color:var(--t2);margin:0 4px;flex-shrink:0">×${ci.qty}</span>
      <span style="color:var(--green);font-weight:600;flex-shrink:0">${db.settings.currency}${(ci.price*ci.qty).toFixed(2)}</span>
      <button onclick="removeFromCart(${ci.id})" style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:14px;margin-left:4px;flex-shrink:0"><i class="ti ti-x"></i></button>`;
    cartEl.appendChild(d);
  });
  const tax=db.settings.taxEnabled===false?0:sub*(db.settings.taxRate/100);
  const discAmt=parseFloat(document.getElementById('disc-amt-inp')?.value)||0;
  const discType=document.getElementById('disc-type-sel')?.value||'flat';
  const discount=discType==='pct'?+(sub*discAmt/100).toFixed(2):+discAmt.toFixed(2);
  const shipOn=window._shipmentOn!==undefined?window._shipmentOn:db.settings.shipmentEnabled;
  const shipAmt=shipOn?(parseFloat(document.getElementById('ship-amt-inp')?.value)||db.settings.shipmentAmount||0):0;
  const grand=+(sub+tax-discount+shipAmt).toFixed(2);
  const taxEl=document.getElementById('tax-val');
  const totEl=document.getElementById('total-val');
  if(taxEl)taxEl.textContent=db.settings.currency+tax.toFixed(2);
  if(totEl)totEl.textContent=db.settings.currency+Math.max(0,grand).toFixed(2);
  // update mobile FAB badge
  const badge=document.getElementById('mob-cart-badge');
  const totalItems=cart.reduce((s,c)=>s+c.qty,0);
  if(badge){badge.textContent=totalItems;badge.style.display=totalItems?'flex':'none';}
}
function removeFromCart(id){window._cart=(window._cart||[]).filter(c=>c.id!==id);updateCartUI();}

function toggleCartShipment(){
  window._shipmentOn=!(window._shipmentOn!==undefined?window._shipmentOn:db.settings.shipmentEnabled);
  const btn=document.getElementById('ship-toggle-btn');
  const inp=document.getElementById('ship-amt-inp');
  if(btn){btn.textContent=window._shipmentOn?'ON':'OFF';btn.className='ship-toggle '+(window._shipmentOn?'on':'off');}
  if(inp){inp.disabled=!window._shipmentOn;inp.style.opacity=window._shipmentOn?'1':'0.4';}
  updateCartUI();
}
function onCustSelChange(){
  const sel=document.getElementById('cust-sel');
  const nameInp=document.getElementById('cust-name-inp');
  if(!sel||!nameInp)return;
  if(sel.value){
    const cust=db.customers.find(c=>c.id==sel.value);
    nameInp.value=cust?cust.name:'';
    nameInp.disabled=true;nameInp.style.opacity='0.55';
  } else {
    nameInp.value='';nameInp.disabled=false;nameInp.style.opacity='1';
  }
}

function completeSale(){
  const cart=window._cart||[];
  if(!cart.length){showToast('Cart is empty');return;}
  const custId=document.getElementById('cust-sel')?.value;
  const custNameTyped=(document.getElementById('cust-name-inp')?.value||'').trim();
  const method=document.getElementById('pay-sel')?.value||'cash';
  const mode=window._posMode||'retail';
  const today=new Date().toISOString().slice(0,10);
  const sub=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const tax=db.settings.taxEnabled===false?0:sub*(db.settings.taxRate/100);
  const discAmt=parseFloat(document.getElementById('disc-amt-inp')?.value)||0;
  const discType=document.getElementById('disc-type-sel')?.value||'flat';
  const discount=discType==='pct'?+(sub*discAmt/100).toFixed(2):+discAmt.toFixed(2);
  const shipOn=window._shipmentOn!==undefined?window._shipmentOn:(db.settings.shipmentEnabled||false);
  const shipAmt=shipOn?+(parseFloat(document.getElementById('ship-amt-inp')?.value)||db.settings.shipmentAmount||0).toFixed(2):0;
  const total=+Math.max(0,sub+tax-discount+shipAmt).toFixed(2);
  const cogs=cart.reduce((s,c)=>s+c.cost*(c.mode==='wholesale'?c.wsQty:1)*c.qty,0);
  const ref='INV-'+String(db.counters.sale++).padStart(4,'0');
  const customerName=custId?(db.customers.find(c=>c.id==custId)?.name||''):(custNameTyped||'Walk-in');
  cart.forEach(ci=>{
    const item=db.items.find(i=>i.id===ci.id);
    if(item){
      const units=ci.mode==='wholesale'?(ci.wsQty*ci.qty):ci.qty;
      item.stock=Math.max(0,item.stock-units);
    }
  });
  const profit=+(sub+tax-discount-cogs).toFixed(2);
  db.sales.push({id:Date.now(),ref,date:today,saleMode:mode,items:cart.map(c=>({id:c.id,name:c.name,qty:c.qty,price:c.price,unit:c.unit})),sub:+sub.toFixed(2),tax:+tax.toFixed(2),discount,shipment:shipAmt,total,cogs:+cogs.toFixed(2),profit,method,customerId:custId||null,customerName,status:method==='credit'?'credit':'paid'});
  // Finance: sale income = revenue after discount (discount already deducted, NOT a separate entry)
  db.finance.push({id:db.counters.finance++,date:today,desc:'Sale '+ref+' ('+mode+')',cat:'sales',amount:+(sub+tax-discount).toFixed(2),type:'income',ref});
  if(shipAmt>0)db.finance.push({id:db.counters.finance++,date:today,desc:(db.settings.shipmentLabel||'Shipment')+' — '+ref,cat:'shipment',amount:shipAmt,type:'income',ref});
  if(custId){const cust=db.customers.find(c=>c.id==custId);if(cust){cust.visits=(cust.visits||0)+1;cust.totalSpent=+((cust.totalSpent||0)+total).toFixed(2);cust.points=(cust.points||0)+Math.floor(total);if(method==='credit')cust.balance=+((cust.balance||0)+total).toFixed(2);}}
  // Cash ledger — record cash-in for non-credit sales
  if(method!=='credit'){
    const cashEntry={id:'CL-'+Date.now(),date:today,type:'in',src:'sale',ref,
      desc:'Sale '+ref+' ('+mode+')',amount:total,balance:0,method};
    db.cash.ledger.push(cashEntry);
    db.cash.balance=+(db.cash.balance+total).toFixed(2);
    recalcCashBalances();
  }
  saveDB();window._cart=[];window._shipmentOn=undefined;
  const di=document.getElementById('disc-amt-inp');if(di)di.value='0';
  updateCartUI();updatePills();
  showToast('✓ '+ref+' — '+customerName+(shipAmt>0?' · shipment logged':'')+(custId?' · points awarded':''));
}

    </div>`;
  document.getElementById('g-modal-foot').innerHTML=`
    <button class="btn-sm" onclick="closeGModal()">Cancel</button>

  document.getElementById('g-modal-bg').classList.add('show');

  ['im-price','im-cost'].forEach(fid=>{
    document.getElementById(fid)?.addEventListener('input',()=>{
      const p=parseFloat(document.getElementById('im-price')?.value)||0;
      const c=parseFloat(document.getElementById('im-cost')?.value)||0;

      if(hint&&p>0){const m=p>0?((p-c)/p*100):0;hint.innerHTML=`Margin: <b style="color:${m>=30?'var(--green)':m>=15?'var(--amber)':'var(--red)'}">${m.toFixed(1)}%</b> &nbsp;·&nbsp; Profit per unit: <b>${db.settings.currency}${(p-c).toFixed(2)}</b>`;}
    });
  });
}

function saveItem(id){
  const name=document.getElementById('im-name')?.value?.trim();
  const price=parseFloat(document.getElementById('im-price')?.value);
  if(!name){showToast('⚠ Item name is required');return;}
  if(!price||price<=0){showToast('⚠ Price must be greater than 0');return;}
  const data={
    name,
    barcode:document.getElementById('im-barcode')?.value||('6'+Date.now().toString().slice(-11)),
    price,
    cost:parseFloat(document.getElementById('im-cost')?.value)||0,
    stock:parseInt(document.getElementById('im-stock')?.value)||0,
    min:parseInt(document.getElementById('im-min')?.value)||5,
    cat:document.getElementById('im-cat')?.value||'other',
    unit:document.getElementById('im-unit')?.value||'pcs',
    wsUnit:document.getElementById('im-wsunit')?.value||'box',
    wsQty:parseInt(document.getElementById('im-wsqty')?.value)||1,
    wsPrice:parseFloat(document.getElementById('im-wsprice')?.value)||0
  };
  if(id&&id!==null&&id!=='null'){
    const idx=db.items.findIndex(i=>i.id===id);
    if(idx>=0)db.items[idx]={...db.items[idx],...data};
    showToast('✓ Item updated!');
  } else {
    db.items.push({id:db.counters.item++,...data});
    showToast(T('items_toast_added'));
  }
  saveDB();closeGModal();renderItems();
}

function addItem(){openItemModal(null);}
function deleteItem(id){
  if(!confirm('Delete this item?'))return;
  db.items=db.items.filter(i=>i.id!==id);
  saveDB();renderItems();showToast('✓ Item deleted');
}

function filterPOHist(q){const done=db.orders.filter(o=>o.status==='received'||o.status==='cancelled');const fl=q?done.filter(o=>o.ref.toLowerCase().includes(q.toLowerCase())||o.supplier.toLowerCase().includes(q.toLowerCase())):done;const tb=document.getElementById('po-hist-tbody');if(tb)tb.innerHTML=histRows(fl);}

    <div class="fr"><label class="fl">Supplier</label><select class="fi" id="m-sup" style="background:var(--bg2)">${supOpts}</select></div>

      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px dashed var(--bd);margin-top:6px;font-size:12px;color:var(--t2)">
        <span><i class="ti ti-truck" style="font-size:13px;margin-right:4px"></i>Shipment / freight cost</span>

function addOIRow(){
  const list=document.getElementById('oi-list');if(!list)return;
  const itemOpts='<option value="">— select item —</option>'+
    db.items.map(i=>`<option value="${i.id}">${i.name} · ${i.unit} (stock: ${i.stock})</option>`).join('')+
    '<option value="__custom__">＋ Custom / unlisted item</option>';
  const unitOpts=UNITS.map(u=>`<option${u==='box'?' selected':''}>${u}</option>`).join('');
  const inpStyle='height:28px;border:1px solid var(--bd2);border-radius:6px;background:var(--bg2);color:var(--t1);font-size:11.5px;padding:0 7px;font-family:inherit';
  const row=document.createElement('div');row.className='oi-row';row.style.cssText='flex-wrap:wrap;gap:5px;align-items:center';
  row.innerHTML=`
    <select class="oi-item-sel" onchange="onOIItemChange(this)" style="${inpStyle};flex:1;min-width:140px">${itemOpts}</select>
    <input class="oi-name-custom" type="text" placeholder="Item name" style="${inpStyle};flex:1;min-width:110px;display:none">
    <input class="oi-qty" type="number" min="1" value="1" placeholder="Qty" oninput="calcOITotal()" style="${inpStyle};width:54px">
    <select class="oi-unit" oninput="calcOITotal()" style="${inpStyle};width:64px">${unitOpts}</select>
    <input class="oi-price" type="number" min="0" step="0.01" value="0" placeholder="Cost" oninput="calcOITotal()" style="${inpStyle};width:76px">
    <span class="oi-sub" style="font-size:11.5px;color:var(--ac);font-weight:600;min-width:52px;text-align:right">${db.settings.currency}0.00</span>
    <button class="oi-del" onclick="this.closest('.oi-row').remove();calcOITotal()" style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:15px;padding:0 2px"><i class="ti ti-x"></i></button>`;
  list.appendChild(row);
}
function onOIItemChange(sel){
  const row=sel.closest('.oi-row');if(!row)return;
  const nameInp=row.querySelector('.oi-name-custom');
  const unitSel=row.querySelector('.oi-unit');
  const priceInp=row.querySelector('.oi-price');
  if(sel.value==='__custom__'){
    if(nameInp){nameInp.style.display='';nameInp.focus();}
  } else if(sel.value){
    const item=db.items.find(i=>i.id===parseInt(sel.value));
    if(nameInp)nameInp.style.display='none';
    if(item){
      if(unitSel)unitSel.value=item.wsUnit||item.unit||'box';
      if(priceInp)priceInp.value=item.cost.toFixed(2);
    }
  } else {
    if(nameInp)nameInp.style.display='none';
  }
  calcOITotal();
}
function calcOITotal(){
  let total=0;
  document.querySelectorAll('.oi-row').forEach(row=>{
    const q=parseFloat(row.querySelector('.oi-qty')?.value)||0;
    const p=parseFloat(row.querySelector('.oi-price')?.value)||0;
    const sub=q*p;total+=sub;
    const s=row.querySelector('.oi-sub');if(s)s.textContent=db.settings.currency+sub.toFixed(2);
  });
  const ship=parseFloat(document.getElementById('m-ship')?.value)||0;
  const ot=document.getElementById('oi-total');if(ot)ot.textContent=db.settings.currency+(total+ship).toFixed(2);
}
function savePO(){
  const sup=db.suppliers.find(s=>s.id===parseInt(document.getElementById('m-sup')?.value));
  const date=document.getElementById('m-date')?.value||new Date().toISOString().slice(0,10);
  const due=document.getElementById('m-due')?.value||date;
  const items=[];let total=0;
  document.querySelectorAll('.oi-row').forEach(row=>{
    const selEl=row.querySelector('.oi-item-sel');
    const itemId=selEl&&selEl.value&&selEl.value!=='__custom__'?parseInt(selEl.value):null;
    const dbItem=itemId?db.items.find(i=>i.id===itemId):null;
    const name=dbItem?dbItem.name:(row.querySelector('.oi-name-custom')?.value?.trim()||'Item');
    const qty=parseInt(row.querySelector('.oi-qty')?.value)||0;
    const unit=row.querySelector('.oi-unit')?.value||'pcs';
    const cost=parseFloat(row.querySelector('.oi-price')?.value)||0;
    if(qty>0)items.push({itemId:itemId||null,name,qty,unit,cost});
    total+=qty*cost;
  });
  if(!items.length){showToast('Add at least one item');return;}
  const shipment=parseFloat(document.getElementById('m-ship')?.value)||0;
  db.orders.unshift({id:Date.now(),ref:'PO-'+String(db.counters.po++).padStart(4,'0'),supplier:sup?sup.name:'Unknown',supId:sup?sup.id:0,date,due,items,shipment,status:'pending',total:+(total+shipment).toFixed(2)});
  saveDB();closeGModal();renderPOOrders();showToast('✓ Purchase order saved!');
}
function openReceivePOModal(id){
  _poModalMode='receive';_receiveOrderId=id;
  const o=db.orders.find(x=>x.id===id);if(!o)return;
  document.getElementById('g-modal-title').textContent='Receive Stock — '+o.ref;
  document.getElementById('g-modal-body').innerHTML=`

function confirmPOReceive(){
  const o=db.orders.find(x=>x.id===_receiveOrderId);if(!o)return;
  const inputs=document.querySelectorAll('.rec-qty');
  let allFull=true,itemsCost=0,updated=0;
  inputs.forEach((inp,i)=>{
    const got=parseInt(inp.value)||0;
    if(got<o.items[i].qty)allFull=false;
    const itemId=inp.dataset.itemid?parseInt(inp.dataset.itemid):null;
    const dbItem=itemId?db.items.find(d=>d.id===itemId):db.items.find(d=>d.name.toLowerCase()===o.items[i].name.toLowerCase());
    if(dbItem&&got>0){
      const mult=(o.items[i].unit&&o.items[i].unit===dbItem.wsUnit&&dbItem.wsQty>1)?dbItem.wsQty:1;
      dbItem.stock=Math.max(0,dbItem.stock+got*mult);
      updated++;
    }
    itemsCost+=got*(o.items[i].cost||0);
  });
  const shipCost=parseFloat(document.getElementById('rec-ship')?.value)||0;
  const grandTotal=+(itemsCost+shipCost).toFixed(2);
  o.status=allFull?'received':'partial';
  o.receivedDate=new Date().toISOString().slice(0,10);
  const today=new Date().toISOString().slice(0,10);
  // ── Finance entries (PO → Finance link) ──
  if(itemsCost>0)
    db.finance.push({id:db.counters.finance++,date:today,desc:'Purchase '+o.ref+' — '+o.supplier,
      cat:'purchase',amount:+itemsCost.toFixed(2),type:'expense',ref:o.ref});
  if(shipCost>0)
    db.finance.push({id:db.counters.finance++,date:today,desc:'Shipment '+o.ref+' — '+o.supplier,
      cat:'purchase_shipment',amount:shipCost,type:'expense',ref:o.ref});
  // ── Cash ledger (cash out) ──
  if(grandTotal>0){
    db.cash.ledger.push({id:'CL-'+Date.now(),date:today,type:'out',src:'purchase',ref:o.ref,
      desc:'Purchase '+o.ref+' — '+o.supplier,amount:grandTotal,balance:0});
    db.cash.balance=+(db.cash.balance-grandTotal).toFixed(2);
    recalcCashBalances();
  }
  saveDB();closeGModal();renderPurchase();
  showToast(`✓ ${o.ref} received — ${updated} item${updated!==1?'s':''} updated · ${db.settings.currency}${grandTotal.toFixed(2)} logged in Finance`);
}

function saveSupplier(){
  const name=document.getElementById('s-name')?.value?.trim();if(!name)return;

  saveDB();closeGModal();renderPOSuppliers();showToast('✓ Supplier saved!');
}

function openFinanceEdit(id){
  const x=db.finance.find(f=>f.id===id);if(!x)return;
  document.getElementById('g-modal-title').textContent='Edit Finance Entry';
  document.getElementById('g-modal-body').innerHTML=`
    <div class="fr"><label class="fl">Description</label><input class="fi" id="fe-desc" type="text" value="${x.desc}"></div>
    <div class="fr2">
      <div class="fr"><label class="fl">Amount (${db.settings.currency})</label><input class="fi" id="fe-amt" type="number" min="0" step="0.01" value="${x.amount.toFixed(2)}"></div>
      <div class="fr"><label class="fl">Date</label><input class="fi" id="fe-date" type="date" value="${x.date}"></div>
    </div>
    <div class="fr2">
      <div class="fr"><label class="fl">Type</label>
        <select class="fi" id="fe-type" style="background:var(--bg2)">
          <option value="income"${x.type==='income'?' selected':''}>Income</option>
          <option value="expense"${x.type==='expense'?' selected':''}>Expense</option>
        </select>
      </div>
      <div class="fr"><label class="fl">Category</label><input class="fi" id="fe-cat" type="text" value="${x.cat}"></div>
    </div>`;
  document.getElementById('g-modal-foot').innerHTML=`
    <button class="btn-sm" onclick="closeGModal()">Cancel</button>
    <button class="btn" onclick="saveFinanceEdit(${id})"><i class="ti ti-check"></i>Save</button>`;
  document.getElementById('g-modal-bg').classList.add('show');
}
function saveFinanceEdit(id){
  const x=db.finance.find(f=>f.id===id);if(!x)return;
  const desc=document.getElementById('fe-desc')?.value?.trim();
  const amt=parseFloat(document.getElementById('fe-amt')?.value);
  const date=document.getElementById('fe-date')?.value;
  const type=document.getElementById('fe-type')?.value;
  const cat=document.getElementById('fe-cat')?.value?.trim();
  if(!desc||isNaN(amt)||!date)return;
  x.desc=desc;x.amount=+amt.toFixed(2);x.date=date;x.type=type;x.cat=cat||x.cat;
  saveDB();closeGModal();renderFinance();showToast('✓ Entry updated');
}
function deleteFinanceEntry(id){
  if(!confirm('Delete this finance entry?'))return;
  db.finance=db.finance.filter(f=>f.id!==id);
  saveDB();renderFinance();showToast('✓ Entry deleted');
}

const EXP_CATS=['rent','salary','util','transport','marketing','maintenance','tax','purchase','other'];
const EXP_CAT_COLORS={rent:'#7c3aed',salary:'#2563eb',util:'#d97706',transport:'#059669',marketing:'#db2777',maintenance:'#ea580c',tax:'#dc2626',purchase:'#0891b2',other:'#6b7280'};

let _expTab='all', _expCatFilter='all', _expPeriod='month', _expEditId=null;

function getExpPeriodDates(){
  const now=new Date();const td=now.toISOString().slice(0,10);
  if(_expPeriod==='today')return{from:td,to:td};
  if(_expPeriod==='week'){const w=new Date(now-6*864e5).toISOString().slice(0,10);return{from:w,to:td};}
  if(_expPeriod==='month'){const m=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);return{from:m,to:td};}
  return{from:'2000-01-01',to:td};
}
function filterExpenses(){
  const {from,to}=getExpPeriodDates();
  let list=db.expenses.filter(e=>e.date>=from&&e.date<=to);
  if(_expCatFilter!=='all')list=list.filter(e=>e.cat===_expCatFilter);
  return list.slice().reverse();
}
function expCatLabel(cat){return T('exp_cat_'+cat)||cat;}
function expTotal(list){return list.reduce((s,e)=>s+e.amount,0);}

function renderExpTabSummary(){
  const today=new Date();
  const monthStart=new Date(today.getFullYear(),today.getMonth(),1).toISOString().slice(0,10);
  const monthExp=db.expenses.filter(e=>e.date>=monthStart);
  const monthTotal=expTotal(monthExp);
  const allTotal=expTotal(db.expenses);
  const daysInMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
  const dayOfMonth=today.getDate();
  const projected=dayOfMonth>0?monthTotal/dayOfMonth*daysInMonth:0;
  const largest=db.expenses.length?db.expenses.reduce((a,b)=>b.amount>a.amount?b:a):null;

function openExpModal(id){
  const e=id?db.expenses.find(x=>x.id===id):null;
  _expEditId=id;
  _expTab='add';
  renderExpenses();
  if(e){
    // pre-fill
    setTimeout(()=>{
      if(document.getElementById('exp-amt'))document.getElementById('exp-amt').value=e.amount;
      if(document.getElementById('exp-date'))document.getElementById('exp-date').value=e.date;
      if(document.getElementById('exp-desc'))document.getElementById('exp-desc').value=e.desc;
      if(document.getElementById('exp-method'))document.getElementById('exp-method').value=e.method||'cash';
      if(document.getElementById('exp-note'))document.getElementById('exp-note').value=e.note||'';
      if(document.getElementById('exp-recur'))document.getElementById('exp-recur').checked=!!e.recur;
      // mark cat chip
      document.querySelectorAll('input[name=exp-cat]').forEach(x=>{x.checked=x.value===e.cat;});
      document.querySelectorAll('[data-cat]').forEach(x=>{
        const c=x.dataset.cat;const col=EXP_CAT_COLORS[c]||'#6b7280';
        if(c===e.cat){x.classList.add('on');x.style.background=col+'20';x.style.color=col;x.style.borderColor=col+'50';}
        else{x.classList.remove('on');x.style=''}
      });
    },50);
  }
}

function saveExpense(id){
  const amt=parseFloat(document.getElementById('exp-amt')?.value);
  const desc=(document.getElementById('exp-desc')?.value||'').trim();
  if(!amt||!desc){showToast('⚠ Amount and description are required');return;}
  const cat=document.querySelector('input[name=exp-cat]:checked')?.value||'other';
  const entry={
    id:id||db.counters.exp++,
    date:document.getElementById('exp-date')?.value||new Date().toISOString().slice(0,10),
    desc,amt:null,
    amount:amt,
    cat,
    method:document.getElementById('exp-method')?.value||'cash',
    paidBy:document.getElementById('exp-paid-by')?.value||'',
    note:document.getElementById('exp-note')?.value||'',
    recur:document.getElementById('exp-recur')?.checked||false
  };
  if(id){
    const idx=db.expenses.findIndex(e=>e.id===id);
    if(idx>=0)db.expenses[idx]=entry;
    // also update finance log if linked
    const fi=db.finance.findIndex(f=>f.ref==='EXP-'+id);
    if(fi>=0){db.finance[fi].amount=amt;db.finance[fi].desc=desc;db.finance[fi].date=entry.date;}
  } else {
    db.expenses.push(entry);
    db.finance.push({id:db.counters.finance++,date:entry.date,desc:desc,cat:cat,amount:amt,type:'expense',ref:'EXP-'+entry.id});
  }
  // Cash ledger — record cash-out for expense
  if(!id&&entry.method==='cash'){
    db.cash.ledger.push({id:'CL-'+Date.now(),date:entry.date,type:'out',src:'expense',
      ref:'EXP-'+entry.id,desc:desc,amount:amt,balance:0});
    db.cash.balance=+(db.cash.balance-amt).toFixed(2);
    recalcCashBalances();
  }
  saveDB();
  _expTab='all';
  renderExpenses();
  showToast(T('exp_toast_saved'));
}

function deleteExp(id){
  if(!confirm('Delete this expense?'))return;
  db.expenses=db.expenses.filter(e=>e.id!==id);
  db.finance=db.finance.filter(f=>f.ref!=='EXP-'+id);
  saveDB();renderExpenses();showToast(T('exp_toast_del'));
}

function saveBudget(){
  const v=parseFloat(document.getElementById('budget-input')?.value)||0;
  db.settings.expBudget=v;
  saveDB();renderExpTabSummary();showToast(T('exp_toast_budget'));
}

function updateTaxPreview(){
  const on=document.getElementById('st-tax-on')?.checked!==false;
  const rate=parseFloat(document.getElementById('st-tax')?.value)||0;
  const incl=document.getElementById('st-tax-incl')?.checked;
  const name=document.getElementById('st-tax-name')?.value||'Tax';
  const cur=db.settings.currency||'€';
  const examplePrice=10.00;
  let taxAmt,total,display;
  if(!on){taxAmt=0;total=examplePrice;display='Tax disabled — no tax applied';}
  else if(incl){taxAmt=examplePrice-(examplePrice/(1+rate/100));total=examplePrice;display=`Price ${cur}${examplePrice.toFixed(2)} (${name} included: ${cur}${taxAmt.toFixed(2)})`;}

    if(np||cp){

      data.pinHash=simpleHash(np);

// ══════════════════════════════════════════════════════════════
//  PARTNER helper — compute per-partner cumulative profit share
// ══════════════════════════════════════════════════════════════
function getPartnerStats(p){
  // All-time net profit from finance
  const inc=db.finance.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=db.finance.filter(x=>x.type==='expense'&&x.cat!=='dividend'&&x.cat!=='withdrawal').reduce((s,x)=>s+x.amount,0);
  const netProfit=Math.max(0,inc-exp);
  const totalDivShare=parseFloat((netProfit*p.share/100).toFixed(2));
  const totalWithdrawn=(db.cash.ledger||[]).filter(e=>e.src==='withdrawal'&&e.partnerId===p.id).reduce((s,e)=>s+e.amount,0);
  const totalContributed=(db.cash.ledger||[]).filter(e=>e.src==='contribution'&&e.partnerId===p.id).reduce((s,e)=>s+e.amount,0);
  const available=parseFloat((totalDivShare - totalWithdrawn).toFixed(2));
  // monthly
  const monthStart=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString().slice(0,10);
  const mInc=db.finance.filter(x=>x.type==='income'&&x.date>=monthStart).reduce((s,x)=>s+x.amount,0);
  const mExp=db.finance.filter(x=>x.type==='expense'&&x.date>=monthStart&&x.cat!=='dividend'&&x.cat!=='withdrawal').reduce((s,x)=>s+x.amount,0);
  const monthlyProfit=Math.max(0,mInc-mExp);
  const monthlyDiv=parseFloat((monthlyProfit*p.share/100).toFixed(2));
  return{netProfit,totalDivShare,totalWithdrawn,totalContributed,available,monthlyProfit,monthlyDiv};
}

function checkPwdOver(avail){
  const amt=parseFloat(document.getElementById('pwd-amt')?.value)||0;
  const warn=document.getElementById('pwd-over-warn');
  const box=document.getElementById('pwd-approval-box');
  if(amt>avail+0.01){
    if(warn)warn.textContent=`⚠ Exceeds available balance by ${db.settings.currency}${(amt-avail).toFixed(2)} — admin approval needed`;
    if(box)box.style.display='block';
  } else {
    if(warn)warn.textContent='';
    if(box)box.style.display='none';
  }
}

function confirmPartnerWithdrawal(id, avail){
  const p=db.partners.find(x=>x.id===id);if(!p)return;
  const amt=parseFloat(document.getElementById('pwd-amt')?.value)||0;
  if(amt<=0){showToast('⚠ Enter a valid amount');return;}
  const method=document.getElementById('pwd-method')?.value||'cash';
  const date=document.getElementById('pwd-date')?.value||new Date().toISOString().slice(0,10);
  const note=document.getElementById('pwd-note')?.value||'';
  const isOver=amt>avail+0.01;
  if(isOver){
    // Validate admin PIN
    const adminUserId=parseInt(document.getElementById('pwd-admin-user')?.value||'0');
    const adminPin=document.getElementById('pwd-admin-pin')?.value||'';
    const adminUser=db.users.find(u=>u.id===adminUserId&&(u.role==='admin'||u.role==='owner'));
    if(!adminUser){showToast('⚠ Select a valid admin');return;}
    if(simpleHash(adminPin)!==adminUser.pinHash){
      showToast('⚠ Incorrect admin PIN');
      document.getElementById('pwd-admin-pin').style.border='1px solid var(--red)';
      setTimeout(()=>{const el=document.getElementById('pwd-admin-pin');if(el)el.style.border='';},1500);
      return;
    }
  }
  // Record in cash ledger with partnerId tag
  const wref='WD-'+String(db.counters.cash++).padStart(4,'0');
  db.cash.ledger.push({id:'CL-'+Date.now(),date,type:'out',src:'withdrawal',ref:wref,
    partnerId:p.id,
    desc:'Withdrawal — '+p.name+(isOver?' [admin approved]':''),
    note,amount:amt,balance:0,method});
  db.cash.balance=+(db.cash.balance-amt).toFixed(2);
  recalcCashBalances();
  // Keep partner.drawn in sync for legacy display
  p.drawn=parseFloat(((p.drawn||0)+amt).toFixed(2));
  // Also log to finance
  db.finance.push({id:db.counters.finance++,date,
    desc:'Partner withdrawal — '+p.name+(isOver?' [admin approved]':''),

function exportData(){

async function importData(event){
  const file=event.target.files[0];if(!file)return;
  try{
    const text=await file.text();
    const parsed=JSON.parse(text);
    showLoader('Restoring backup…');
    await apiPut(parsed);
    db=parsed;
    hideLoader();
    render(_curPage);
    showToast('✓ Backup restored!');
  }catch(e){
    hideLoader();
    showToast('⚠ Invalid backup file');

}
async function doReset(type){
  if(!confirm('Are you sure? This cannot be undone.'))return;
  clearTimeout(_saveTimer);
  if(type==='sales'){
    db.sales=[];
    db.finance=db.finance.filter(f=>f.cat==='purchase');
    db.counters.sale=1;
    saveDB();render(_curPage);showToast('✓ Sales reset done');
  } else if(type==='stock'){
    db.items.forEach(i=>i.stock=0);
    saveDB();render(_curPage);showToast('✓ Stock reset done');
  } else if(type==='finance'){
    db.finance=[];
    db.counters.finance=1;
    saveDB();render(_curPage);showToast('✓ Finance reset done');
  } else {
    // Factory reset — immediately wipe all transactional data in memory,
    // re-render the login screen, then sync the clean state to the server in the background
    showToast('⏳ Resetting…');
    db.sales=[];
    db.expenses=[];
    db.finance=[];
    db.orders=[];
    db.cash={balance:0,openingBalance:0,ledger:[],contributions:[]};
    db.counters={sale:1,item:db.counters.item,customer:db.counters.customer,
                 finance:1,po:1,user:db.counters.user,partner:db.counters.partner,exp:1,cash:1};
    // Reset transactional customer fields
    db.customers.forEach(c=>{c.points=0;c.balance=0;c.totalSpent=0;c.visits=0;});
    // Re-render immediately — user sees fresh app at once
    render('pos');
    showToast('✓ Factory reset done — data cleared');
    // Persist to server in background (no await — non-blocking)
    apiPut(db).catch(()=>showToast('⚠ Server sync failed — reload to retry'));
  }
}
function renderSetReset(){
  document.getElementById('set-view').innerHTML=`
    <div class="page-head"><span class="page-title"><i class="ti ti-refresh-alert"></i>Reset &amp; danger zone</span></div>
    <div class="danger-zone">
      <div class="dz-title"><i class="ti ti-alert-triangle" style="font-size:16px"></i>Danger zone</div>
      ${[
        ['Reset sales data','Delete all sales history (keeps items & customers)','sales'],
        ['Reset stock levels','Set all item quantities to zero','stock'],
        ['Reset finance log','Clear all finance entries','finance'],

        <div class="dz-info"><span class="dz-lbl">${l}</span><span class="dz-sub">${sub}</span></div>
        <button class="dz-btn" onclick="doReset('${t}')">${t==='all'?'Factory reset':'Reset'}</button>
      </div>`).join('')}
    </div>`;
}

   CASH ACCOUNT MODULE
   - Opening balance
   - Auto-records: sales in, purchases out, expenses out
   - Manual contributions (owner/partner deposits)

function recalcCashBalances(){
  // Rebuild running balance column from first entry
  if(!db.cash||!db.cash.ledger)return;
  const ob=db.cash.openingBalance||0;
  let running=ob;
  const sorted=db.cash.ledger.slice().sort((a,b)=>a.id>b.id?1:-1);
  sorted.forEach(e=>{
    running=e.type==='in'?+(running+e.amount).toFixed(2):+(running-e.amount).toFixed(2);
    e.balance=running;
  });
  // also update db.cash.balance to latest
  db.cash.balance=sorted.length?sorted[sorted.length-1].balance:ob;
  // put back in date order
  db.cash.ledger=sorted;
}

let _cashTab='ledger', _cashPeriod='all', _cashPartnerFilter='all', _cashReportPartnerId=null;

function renderCash(){

  const ob=db.cash.openingBalance||0;

  // Compute period totals
  const today=new Date().toISOString().slice(0,10);
  const monthStart=today.slice(0,7)+'-01';
  const ledger=db.cash.ledger;
  const totalIn=ledger.filter(e=>e.type==='in').reduce((s,e)=>s+e.amount,0);
  const totalOut=ledger.filter(e=>e.type==='out').reduce((s,e)=>s+e.amount,0);
  const todayIn=ledger.filter(e=>e.type==='in'&&e.date===today).reduce((s,e)=>s+e.amount,0);
  const monthIn=ledger.filter(e=>e.type==='in'&&e.date>=monthStart).reduce((s,e)=>s+e.amount,0);

  document.getElementById('main').innerHTML=`
    <div class="stat-row">
      <div class="sc" style="border-left:3px solid ${bal>=0?'var(--greenm)':'var(--red)'}">

        <div class="sv" style="color:${bal>=0?'var(--green)':'var(--red)'};font-size:22px">${cur}${bal.toFixed(2)}</div>
      </div>
      <div class="sc sc-green"><div class="sl">Total Cash In</div><div class="sv" style="color:var(--green)">${cur}${totalIn.toFixed(2)}</div></div>
      <div class="sc sc-red"><div class="sl">Total Cash Out</div><div class="sv" style="color:var(--red)">${cur}${totalOut.toFixed(2)}</div></div>
      <div class="sc sc-accent"><div class="sl">Today In</div><div class="sv" style="color:var(--ac)">${cur}${todayIn.toFixed(2)}</div></div>
      <div class="sc sc-amber"><div class="sl">This Month In</div><div class="sv" style="color:var(--amber)">${cur}${monthIn.toFixed(2)}</div></div>
      <div class="sc sc-purple"><div class="sl">Opening Bal.</div><div class="sv" style="color:var(--purple)">${cur}${ob.toFixed(2)}</div></div>
    </div>

    <!-- Tab row -->
    <div class="subtab-row">
      <button class="subtab${_cashTab==='ledger'?' on':''}" onclick="_cashTab='ledger';renderCash()"><i class="ti ti-list-details"></i>Ledger</button>
      <button class="subtab${_cashTab==='contribute'?' on':''}" onclick="_cashTab='contribute';renderCash()"><i class="ti ti-arrow-bar-to-down"></i>Receive Cash</button>
      <button class="subtab${_cashTab==='withdraw'?' on':''}" onclick="_cashTab='withdraw';renderCash()"><i class="ti ti-arrow-bar-up"></i>Withdrawal</button>
      <button class="subtab${_cashTab==='report'?' on':''}" onclick="_cashTab='report';_cashReportPartnerId=null;renderCash()"><i class="ti ti-printer"></i>Print Report</button>
      <button class="subtab${_cashTab==='partner'?' on':''}" onclick="_cashTab='partner';renderCash()"><i class="ti ti-user-dollar"></i>Partner Reports</button>
      <button class="subtab${_cashTab==='settings'?' on':''}" onclick="_cashTab='settings';renderCash()"><i class="ti ti-settings"></i>Setup</button>
    </div>
    <div id="cash-tab-body"></div>`;

  if(_cashTab==='ledger')renderCashLedger();
  else if(_cashTab==='contribute')renderCashContribute();
  else if(_cashTab==='withdraw')renderCashWithdraw();
  else if(_cashTab==='report')renderCashReport();
  else if(_cashTab==='partner')renderCashPartnerReports();
  else renderCashSetup();
}

function getCashLedgerFiltered(){
  const today=new Date().toISOString().slice(0,10);
  const monthStart=today.slice(0,7)+'-01';
  const yearStart=today.slice(0,4)+'-01-01';
  let rows=db.cash.ledger.slice().reverse();
  if(_cashPeriod==='today')rows=rows.filter(e=>e.date===today);
  else if(_cashPeriod==='month')rows=rows.filter(e=>e.date>=monthStart);
  else if(_cashPeriod==='year')rows=rows.filter(e=>e.date>=yearStart);
  if(_cashPartnerFilter!=='all')rows=rows.filter(e=>String(e.partnerId)===String(_cashPartnerFilter));
  return rows;
}

function saveCashContribution(){

  const from=document.getElementById('ctb-from')?.value||'';

  const note=document.getElementById('ctb-note')?.value||'';

  if(!db.cash.contributions)db.cash.contributions=[];
  const cid='CTB-'+String(db.counters.cash++).padStart(4,'0');
  db.cash.contributions.push({id:cid,date,amount:amt,from,desc,note});
  db.cash.ledger.push({id:'CL-'+Date.now(),date,type:'in',src:'contribution',
    ref:cid,desc:desc+(from?' — '+from:''),amount:amt,balance:0});
  db.cash.balance=+(db.cash.balance+amt).toFixed(2);
  recalcCashBalances();
  saveDB();renderCash();showToast('✓ Cash contribution recorded!');
}

function saveCashWithdrawal(){
  const amt=parseFloat(document.getElementById('wd-amt')?.value)||0;
  const by=document.getElementById('wd-by')?.value||'';
  const desc=(document.getElementById('wd-desc')?.value||'').trim()||'Withdrawal';
  const date=document.getElementById('wd-date')?.value||new Date().toISOString().slice(0,10);
  const note=document.getElementById('wd-note')?.value||'';
  if(!amt){showToast('⚠ Enter an amount');return;}
  if(amt>(db.cash.balance||0)){
    if(!confirm(`Amount exceeds current balance (${db.settings.currency}${(db.cash.balance||0).toFixed(2)}). Continue?`))return;
  }
  const wid='WD-'+String(db.counters.cash++).padStart(4,'0');
  db.cash.ledger.push({id:'CL-'+Date.now(),date,type:'out',src:'withdrawal',
    ref:wid,desc:desc+(by?' — '+by:''),note,amount:amt,balance:0});
  db.cash.balance=+(db.cash.balance-amt).toFixed(2);
  recalcCashBalances();
  saveDB();renderCash();showToast('✓ Withdrawal recorded!');
}

            ['Total In',db.settings.currency+db.cash.ledger.filter(e=>e.type==='in').reduce((s,e)=>s+e.amount,0).toFixed(2),'var(--green)'],
            ['Total Out',db.settings.currency+db.cash.ledger.filter(e=>e.type==='out').reduce((s,e)=>s+e.amount,0).toFixed(2),'var(--red)'],
            ['Contributions',db.cash.contributions?.length||0,'var(--ac)'],
            ['Current Balance',db.settings.currency+(db.cash.balance||0).toFixed(2),(db.cash.balance||0)>=0?'var(--green)':'var(--red)'],
          ].map(([l,v,c])=>`<div style="background:var(--bg2);border-radius:var(--radius);padding:10px">
            <div style="font-size:10.5px;color:var(--t2);margin-bottom:3px">${l}</div>
            <div style="font-size:15px;font-weight:600;color:${c}">${v}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function saveCashSetup(){
  const ob=parseFloat(document.getElementById('ca-ob')?.value)||0;
  db.cash.openingBalance=ob;
  recalcCashBalances();
  saveDB();renderCash();showToast('✓ Opening balance saved!');
}

/* ════════════════════════════════════════════
   MODAL / TOAST
════════════════════════════════════════════ */
function closeGModal(){document.getElementById('g-modal-bg').classList.remove('show');}
document.getElementById('g-modal-bg').addEventListener('click',function(e){if(e.target===this)closeGModal();});
let _toastT;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastT);_toastT=setTimeout(()=>el.classList.remove('show'),2800);
}

/* ═══════════════════════════════════════════
   BOOT — async: load from server then show login
═══════════════════════════════════════════ */
(async function boot(){
  showLoader('Connecting to server…');
  try{
    db = await apiGet();
    // guard missing arrays (server already seeds but just in case)
    if(!db.expenses){db.expenses=[];}
    if(!db.counters.exp){db.counters.exp=1;}
    if(!db.settings.expBudget){db.settings.expBudget=0;}
    if(!db.settings.taxEnabled && db.settings.taxEnabled!==false) db.settings.taxEnabled=true;
    if(!db.settings.taxName) db.settings.taxName='Tax';
    if(!db.cash)db.cash={balance:0,openingBalance:0,ledger:[],contributions:[]};
    if(!db.counters.cash)db.counters.cash=1;
    db.items.forEach(it=>{if(!it.unit)it.unit='pcs';if(!it.wsUnit)it.wsUnit='box';if(!it.wsQty)it.wsQty=1;if(!it.wsPrice)it.wsPrice=it.cost;});
    db.partners.forEach(p=>{if(!p.withdrawals)p.withdrawals=[];if(p.availableBalance===undefined)p.availableBalance=0;});
    db.users.forEach(u=>{if(!u.pinHash)u.pinHash=simpleHash(DEFAULT_PINS[u.role]||'1234');});
    hideLoader();
    updateLogo();
    // Init language
    _lang=db.settings.lang||'en';
    document.documentElement.setAttribute('dir',LANGS[_lang].dir);
    document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.lbtn').forEach(b=>{
      if((b.textContent==='فارسی'&&_lang==='fa')||(b.textContent==='EN'&&_lang==='en')||(b.textContent==='پښتو'&&_lang==='ps'))b.classList.add('on');
    });
    updatePills();
    // Show login
    document.getElementById('wrap').style.display='none';
    buildLoginScreen();
  }catch(err){
    hideLoader();
    document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;flex-direction:column;gap:12px;color:#374151"><div style="font-size:32px">⚠️</div><div style="font-size:16px;font-weight:600">Cannot connect to server</div><div style="font-size:13px;color:#6b7280">Make sure the Node.js backend is running on the same origin.</div><div style="font-size:12px;color:#9ca3af;margin-top:4px;font-family:monospace">${err.message}</div><button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:13px;cursor:pointer">Retry</button></div>`;
  }
})();

/* ════════════════════════════════════════════
   LOGIN SYSTEM
════════════════════════════════════════════ */
// Default PINs per role (4-digit). Stored hashed (simple hash for demo).
// Real prod: use bcrypt. Here we use a quick hash so PINs aren't plain text.
const ROLE_COLORS={owner:'linear-gradient(135deg,#7c3aed,#5b21b6)',admin:'linear-gradient(135deg,#2563eb,#1d4ed8)',cashier:'linear-gradient(135deg,#16a34a,#15803d)',viewer:'linear-gradient(135deg,#6b7280,#4b5563)'};
const DEFAULT_PINS={owner:'1234',admin:'1111',cashier:'0000',viewer:'9999'};

function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return String(h);}

let _loginUser=null, _pinBuffer='';

const LOGIN_TR={
  en:{tagline:'Select your account',enter_pin:'Enter PIN',wrong:'Wrong PIN — try again',select_user:'Please select a user first',logout_lbl:'Logout'},
  fa:{tagline:'حساب کاربری خود را انتخاب کنید',enter_pin:'رمز ورود',wrong:'رمز اشتباه است',select_user:'ابتدا کاربری انتخاب کنید',logout_lbl:'خروج'},
  ps:{tagline:'خپل کارونکی وټاکئ',enter_pin:'PIN دننه کړئ',wrong:'غلط PIN — بیا هڅه وکړئ',select_user:'لومړی کارونکی وټاکئ',logout_lbl:'وتل'},
};

function LT(k){return(LOGIN_TR[_lang]||LOGIN_TR.en)[k]||k;}

function setLoginLang(l){
  _lang=l;
  db.settings.lang=l;
  document.documentElement.setAttribute('dir',LANGS[l].dir);
  document.querySelectorAll('.login-lbtn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.login-lbtn').forEach(b=>{
    if((b.textContent==='فارسی'&&l==='fa')||(b.textContent==='EN'&&l==='en')||(b.textContent==='پښتو'&&l==='ps'))b.classList.add('on');
  });
  document.getElementById('lt-tagline').textContent=LT('tagline');
  document.getElementById('lt-enter-pin').textContent=LT('enter_pin');
}

function buildLoginScreen(){
  document.getElementById('lt-tagline').textContent=LT('tagline');
  document.getElementById('lt-enter-pin').textContent=LT('enter_pin');
  // user buttons
  const grid=document.getElementById('login-user-grid');
  grid.innerHTML=db.users.filter(u=>u.status==='active').map(u=>`
    <button class="login-user-btn" id="lub-${u.id}" onclick="selectLoginUser(${u.id})">
      <span class="login-role-badge badge b-${u.role}">${u.role}</span>
      <div class="login-avatar" style="background:${ROLE_COLORS[u.role]||ROLE_COLORS.viewer}">${u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
      <div class="login-uname">${u.name.split(' ')[0]}</div>
      <div class="login-urole">${u.role}</div>
    </button>`).join('');
  // numpad
  const numpad=document.getElementById('numpad');
  const keys=['1','2','3','4','5','6','7','8','9','','0','⌫'];
  numpad.innerHTML=keys.map(k=>k===''?`<div></div>`:
    `<button class="np-btn${k==='⌫'?' del':''}" onclick="numpadPress('${k}')">${k}</button>`).join('');
  updatePinDots();
}

function selectLoginUser(id){
  _loginUser=db.users.find(u=>u.id===id);
  _pinBuffer='';
  document.querySelectorAll('.login-user-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('lub-'+id)?.classList.add('selected');
  document.getElementById('login-error').textContent='';
  updatePinDots();
}

function numpadPress(key){
  if(!_loginUser){document.getElementById('login-error').textContent=LT('select_user');return;}
  if(key==='⌫'){_pinBuffer=_pinBuffer.slice(0,-1);}
  else if(_pinBuffer.length<4){_pinBuffer+=key;}
  updatePinDots();
  if(_pinBuffer.length===4)setTimeout(attemptLogin,120);
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    const dot=document.getElementById('dot-'+i);
    if(dot)dot.classList.toggle('filled',i<_pinBuffer.length);
  }
}

function attemptLogin(){
  if(!_loginUser)return;
  const entered=simpleHash(_pinBuffer);
  if(entered===_loginUser.pinHash){
    // success
    document.getElementById('login-screen').style.opacity='0';
    document.getElementById('login-screen').style.transition='opacity .35s';
    setTimeout(()=>{
      document.getElementById('login-screen').style.display='none';
      document.getElementById('wrap').style.display='flex';
    },350);
    document.getElementById('login-error').textContent='';
    // update topbar with logged-in user
    const tbLogout=document.getElementById('tb-logout-lbl');
    if(tbLogout)tbLogout.textContent=LT('logout_lbl');
    // update sidebar user info if elements exist
    setLang(_lang);
    render('pos');
    showToast('✓ Welcome, '+_loginUser.name.split(' ')[0]+'!');
  } else {
    document.getElementById('login-error').textContent=LT('wrong');
    // shake dots
    const dotsEl=document.getElementById('pin-dots');
    dotsEl.style.transform='translateX(8px)';
    setTimeout(()=>dotsEl.style.transform='translateX(-8px)',80);
    setTimeout(()=>dotsEl.style.transform='translateX(0)',160);
    dotsEl.style.transition='transform .08s';
    _pinBuffer='';
    setTimeout(updatePinDots,180);
  }
}

function doLogout(){
  _loginUser=null;_pinBuffer='';
  document.getElementById('wrap').style.display='none';
  const ls=document.getElementById('login-screen');
  ls.style.display='flex';ls.style.opacity='0';
  setTimeout(()=>{ls.style.transition='opacity .3s';ls.style.opacity='1';},10);
  document.querySelectorAll('.login-user-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('login-error').textContent='';
  updatePinDots();
}

// Init: hide app, show login — handled inside boot() above


</script>
